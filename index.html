(function(){
"use strict";
var fill=document.querySelector('#splash-fill');
var pct=0;
var iv=setInterval(function(){pct=pct<85?pct+(Math.random()*8+2):pct+0.3;if(pct>97)pct=97;fill.style.width=Math.min(pct,97)+'%';},120);
function hideSplash(){clearInterval(iv);fill.style.width='100%';setTimeout(function(){var s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(function(){s.remove();},500);}},300);}

// ── PWA INSTALL PROMPT ───────────────────────────────────────────────────────
var deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show install banner after app loads
  setTimeout(showInstallBanner, 3000);
});
window.addEventListener('appinstalled', function() {
  deferredInstallPrompt = null;
  removeInstallBanner();
  showToast('✅ Verbarium instalado com sucesso!', '#22c55e');
});

function showInstallBanner() {
  if (!deferredInstallPrompt) return;
  if (localStorage.getItem('vb_install_dismissed') === 'yes') return;
  var existing = document.getElementById('vb-install-banner');
  if (existing) return;
  var banner = document.createElement('div');
  banner.id = 'vb-install-banner';
  banner.innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">' +
    '<span style="font-size:22px;">📲</span>' +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-weight:600;font-size:14px;">Instalar Verbarium PRO</div>' +
    '<div style="font-size:12px;opacity:0.8;margin-top:2px;">Adicionar à tela inicial · funciona offline</div>' +
    '</div>' +
    '<button id="vb-install-btn" style="padding:8px 16px;background:#b48cff;color:#000;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;white-space:nowrap;">Instalar</button>' +
    '<button id="vb-install-dismiss" style="padding:8px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:8px;cursor:pointer;font-size:12px;">✕</button>' +
    '</div>';
  banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#1a0a2a,#0a0a1f);color:#e8e0ff;padding:14px 18px;z-index:8000;box-shadow:0 -4px 24px rgba(0,0,0,0.5);border-top:1px solid rgba(180,140,255,0.3);font-family:Georgia,serif;animation:slideUpBanner 0.3s ease;';
  if (!document.getElementById('vb-banner-style')) {
    var st = document.createElement('style');
    st.id = 'vb-banner-style';
    st.textContent = '@keyframes slideUpBanner{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(banner);
  document.getElementById('vb-install-btn').addEventListener('click', function() {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(function(r) {
      deferredInstallPrompt = null;
      removeInstallBanner();
    });
  });
  document.getElementById('vb-install-dismiss').addEventListener('click', function() {
    localStorage.setItem('vb_install_dismissed','yes');
    removeInstallBanner();
  });
}

function removeInstallBanner() {
  var b = document.getElementById('vb-install-banner');
  if (b) { b.style.opacity='0'; b.style.transform='translateY(100%)'; b.style.transition='all 0.3s'; setTimeout(function(){b.remove();},300); }
}

// ── UPDATE NOTIFICATION ──────────────────────────────────────────────────────
var pendingNewSW = null;

function showToast(msg, color, duration) {
  color = color || '#b48cff';
  duration = duration || 4000;
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#15121f;border:1px solid '+color+';color:#e8e0ff;padding:12px 20px;border-radius:12px;font-size:13px;z-index:9000;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:flex;align-items:center;gap:10px;font-family:Georgia,serif;white-space:nowrap;animation:fadeIn 0.2s;max-width:90vw;';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(function(){t.remove();},300);}, duration);
}

function showUpdateBanner() {
  var existing = document.getElementById('vb-update-banner');
  if (existing) return;
  var banner = document.createElement('div');
  banner.id = 'vb-update-banner';
  banner.innerHTML =
    '<span style="font-size:18px;">🔄</span>' +
    '<div style="flex:1"><div style="font-weight:600;font-size:14px;">Nova versão disponível!</div><div style="font-size:12px;opacity:0.8;margin-top:2px;">Clique para atualizar o Verbarium.</div></div>' +
    '<button id="vb-update-btn" style="padding:8px 16px;background:#b48cff;color:#000;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;">Atualizar</button>' +
    '<button id="vb-update-dismiss" style="padding:8px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:8px;cursor:pointer;font-size:12px;">✕</button>';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#0a1a30,#0a0a1f);color:#e8e0ff;padding:12px 18px;z-index:8000;box-shadow:0 4px 24px rgba(0,0,0,0.5);border-bottom:1px solid rgba(80,200,255,0.4);font-family:Georgia,serif;display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:slideDownBanner 0.3s ease;';
  if (!document.getElementById('vb-banner-style2')) {
    var st = document.createElement('style');
    st.id = 'vb-banner-style2';
    st.textContent = '@keyframes slideDownBanner{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(banner);
  document.getElementById('vb-update-btn').addEventListener('click', function() {
    if (pendingNewSW) { pendingNewSW.postMessage({type:'SKIP_WAITING'}); }
    window.location.reload();
  });
  document.getElementById('vb-update-dismiss').addEventListener('click', function() {
    var b = document.getElementById('vb-update-banner');
    if (b) { b.style.opacity='0'; b.style.transition='opacity 0.3s'; setTimeout(function(){b.remove();},300); }
  });
}

function useScreen() {
  const get = () => ({
    w: window.innerWidth,
    mobile: window.innerWidth < 640,
    tablet: window.innerWidth >= 640 && window.innerWidth < 1024
  });
  const [s, ss] = useState(get);
  useEffect(() => {
    const h = () => ss(get());
    window.addEventListener("resize", h);
    window.addEventListener("orientationchange", () => setTimeout(h, 250));
    return () => {
      window.removeEventListener("resize", h);
    };
  }, []);
  return s;
}

// ── TEXT PARSER ───────────────────────────────────────────────────────────────
function parseRawText(text) {
  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const entries = [];
  for (const line of lines) {
    // Formats supported:
    // word = translation
    // word - translation
    // word | translation | class | pronunciation
    // word : translation
    const sep = /\s*[=|\-:]\s*/;
    const parts = line.split(sep).map(p => p.trim()).filter(Boolean);
    if (parts.length >= 2) {
      entries.push({
        word: parts[0],
        translation: parts[1],
        class: parts[2] || 'substantivo',
        pronunciation: parts[3] || '',
        etymology: '',
        definition: '',
        examples: [],
        tags: [],
        roots: [],
        notes: '',
        audio: null,
        image: null,
        created: new Date().toISOString().split('T')[0]
      });
    }
  }
  return entries;
}

// ── URL IMPORTER (JSON / CSV / Google Sheets public CSV) ─────────────────────
async function fetchFromUrl(url) {
  // Handle Google Sheets: convert /edit url to CSV export url
  const gsMatch = url.match(/docs\.google\.com\/spreadsheets\/d\/([^/]+)/);
  if (gsMatch) {
    const sheetId = gsMatch[1];
    url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
  }
  const resp = await fetch(url, {
    mode: 'cors'
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();

  // Try JSON first
  try {
    const json = JSON.parse(text);
    // If it's a .confor file
    if (json.confor_version) return {
      type: 'confor',
      data: json.conlang
    };
    // If it's an array of entries
    if (Array.isArray(json)) return {
      type: 'entries',
      data: json
    };
    // If it's a dict object with entries array
    if (json.entries) return {
      type: 'entries',
      data: json.entries
    };
  } catch {}

  // Try CSV
  const lines = text.split(/\r?\n/).filter(Boolean);
  const isHeader = lines[0] && /palavra|word|traduc/i.test(lines[0]);
  const dataLines = isHeader ? lines.slice(1) : lines;
  const entries = dataLines.map((line, i) => {
    const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    if (!cols[0]) return null;
    return {
      id: Date.now() + i,
      word: cols[0] || '',
      translation: cols[1] || '',
      class: cols[2] || 'substantivo',
      pronunciation: cols[3] || '',
      etymology: cols[4] || '',
      definition: cols[5] || '',
      tags: (cols[6] || '').split(';').map(t => t.trim()).filter(Boolean),
      notes: cols[7] || '',
      examples: [],
      roots: [],
      audio: null,
      image: null,
      created: new Date().toISOString().split('T')[0]
    };
  }).filter(Boolean);
  return {
    type: 'entries',
    data: entries
  };
}

function loadPdfJs(cb) {
  if (window.pdfjsLib) {
    cb();
    return;
  }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = () => {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    cb();
  };
  document.head.appendChild(s);
}
async function extractPdfText(file) {
  return new Promise((resolve, reject) => {
    loadPdfJs(async () => {
      try {
        const ab = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument({
          data: ab
        }).promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const tc = await page.getTextContent();
          fullText += tc.items.map(it => it.str).join(' ') + '\n';
        }
        resolve(fullText);
      } catch (e) {
        reject(e);
      }
    });
  });
}

if('serviceWorker' in navigator){

    navigator.serviceWorker.register('sw.js')
      .then(function(reg){
        console.log('[SW] Registrado:',reg.scope);
        // Check for updates every 60 seconds
        setInterval(function(){reg.update();},60000);
        // Detect new version installing
        reg.addEventListener('updatefound',function(){
          var newSW = reg.installing;
          newSW.addEventListener('statechange',function(){
            if(newSW.state==='installed' && navigator.serviceWorker.controller){
              pendingNewSW = newSW;
              showUpdateBanner();
            }
          });
        });
      })
      .catch(function(e){console.warn('[SW]',e);});
    // When SW activates new version, reload
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      if(!refreshing){ refreshing=true; window.location.reload(); }
    });
  });
}
