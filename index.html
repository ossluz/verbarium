  lessons:[
    {id:1,title:"Lição 1 — Saudações e Primeiros Passos",description:"Aprenda a cumprimentar em Esperanto e as expressões mais básicas do dia a dia.",entryIds:[16,17,19,21,22],content:"Esperanto foi projetado para ser simples de aprender. Todas as palavras são pronunciadas exatamente como se escrevem. Nesta lição, você aprenderá as saudações essenciais:\n\n• Bonan matenon! = Bom dia!\n• Bonan posttagmezon! = Boa tarde!\n• Bonan nokton! = Boa noite!\n• Saluton! = Olá!\n• Ĝis revido! = Até logo!\n• Dankon! = Obrigado!\n• Nedankinde! = De nada!\n\nLembre: todo substantivo termina em -o, todo adjetivo em -a.",created:"2024-01-01"},
    {id:2,title:"Lição 2 — Natureza e Cosmos",description:"Vocabulário relacionado à natureza, o céu, e os elementos do mundo natural.",entryIds:[10,11,12,13,5],content:"O Esperanto usa raízes latinas, gregas e germânicas. Nesta lição exploramos o vocabulário da natureza:\n\n• suno, luno, stelo (estrela), nuvoj (nuvens)\n• akvo, tero (terra), aero (ar), fajro (fogo)\n• La suno brilas = O sol brilha\n• La luno estas plena = A lua está cheia\n• Akvo estas vivo = Água é vida\n\nDica: Adicione -ejo para fazer lugar: akvo → akvejo (lugar de água = piscina, fonte).",created:"2024-01-01"},
    {id:3,title:"Lição 3 — Gramática Essencial",description:"As regras fundamentais do Esperanto: sufixos, conjugação verbal e estrutura da frase.",entryIds:[1,4,7,6,15],content:"O Esperanto tem apenas 16 regras gramaticais básicas, sem exceções:\n\n📌 SUFIXOS NOMINAIS\n-o = substantivo (libro = livro)\n-a = adjetivo (bona = bom)\n-e = advérbio (bone = bem)\n-i = infinitivo verbal (ami = amar)\n\n📌 CONJUGAÇÃO VERBAL\n-as = presente (mi amas = eu amo)\n-is = passado (mi amis = eu amei)\n-os = futuro (mi amos = eu amarei)\n-us = condicional (mi amus = eu amaria)\n-u = subjuntivo/imperativo (amu! = ame!)\n\n📌 PLURAL e ACUSATIVO\nPlural: + -j (libroj = livros)\nAcusativo (objeto): + -n (mi vidas libron = eu vejo um livro)",created:"2024-01-01"},

  grammar:{
    morphology:"Esperanto é uma língua aglutinante com morfologia completamente regular.\n\nSUFIXOS FUNDAMENTAIS:\n• Substantivos: -o (homo = pessoa, libro = livro)\n• Adjetivos: -a (bona = bom, nova = novo)\n• Advérbios: -e (bone = bem, nove = novamente)\n• Verbos infinitivo: -i (ami = amar, lerni = aprender)\n\nCONJUGAÇÃO VERBAL (invariável para todas as pessoas):\n• Presente: -as (mi amas, vi amas, li amas)\n• Passado: -is (mi amis)\n• Futuro: -os (mi amos)\n• Condicional: -us (mi amus)\n• Volitivo/Imperativo: -u (amu!)\n\nPARTICÍPIOS:\n• Ativo presente: -ant- (amanta = que ama)\n• Ativo passado: -int- (aminta = que amou)\n• Passivo presente: -at- (amata = amado)",
    syntax:"ORDEM DAS PALAVRAS:\nOrdem básica SVO, mas flexível devido ao acusativo.\n\n• Mi vidas la libron. (Eu vejo o livro.) — padrão\n• La libron mi vidas. (O livro, eu vejo.) — ênfase no objeto\n\nARTIGOS:\n• Definido: la (la libro = o livro)\n• Indefinido: inexistente (libro = um livro / o livro)\n\nPRONOMES:\nmi (eu), vi (você/vocês), li (ele), ŝi (ela), ĝi (ele/ela neutro), ni (nós), ili (eles)\n\nNEGAÇÃO:\n• ne (não): Mi ne amas. = Eu não amo.\n• neniu (nenhum), neniam (nunca), nenio (nada)",
    writingSystem:"ALFABETO ESPERANTO (28 letras):\na b c ĉ d e f g ĝ h ĥ i j ĵ k l m n o p r s ŝ t u ŭ v z\n\nLETRAS ESPECIAIS (acento circunflexo):\n• ĉ = /tʃ/ (como 'tch' em 'tchau')\n• ĝ = /dʒ/ (como 'dj' em 'djinn')\n• ĥ = /x/ (como 'rr' no espanhol)\n• ĵ = /ʒ/ (como 'j' em 'bonjour')\n• ŝ = /ʃ/ (como 'sh' em 'show')\n• ŭ = /w/ (usado em 'aŭ' e 'eŭ')\n\nPRINCÍPIO FUNDAMENTAL: Uma letra = Um som. Sem exceções.",
    custom:[
      {title:"Afixos Derivacionais",content:"O Esperanto usa um sistema produtivo de afixos para criar novas palavras:\n\nPREFIXOS:\n• mal- (oposto): bona → malbona (mau), granda → malgranda (pequeno)\n• re- (de novo): fari → refari (refazer)\n• ek- (início de ação): kuri → ekkuri (começar a correr)\n• mis- (incorretamente): kompreni → miskompreni (mal-entender)\n• dis- (dispersão): doni → disdoni (distribuir)\n\nSUFIXOS NOMINAIS:\n• -ejo (lugar): lerni → lernejo (escola)\n• -isto (profissional): muziko → muzikisto (músico)\n• -ino (feminino): amiko → amikino (amiga)\n• -ido (descendente): bovo → bovido (bezerro)\n• -eco (qualidade abstrata): bona → boneco (bondade)\n• -aĵo (coisa concreta): nova → novaĵo (novidade)"}
    ]
  },
  phonology:{
    usedConsonants:["p","b","t","d","k","g","f","v","s","z","ʃ","ʒ","tʃ","dʒ","x","h","m","n","r","l","j"],
    usedVowels:["a","e","i","o","u"],
    toneSystem:"Sem tons. Acento tônico sempre na penúltima sílaba: li-BRO, ho-MO, sa-LU-ton.",
    notes:"Esperanto tem pronúncia completamente regular e fonética.\n\nPONTOS ESPECIAIS:\n• O 'r' é vibrante (como no espanhol/italiano)\n• Todas as vogais são curtas e claras: a, e, i, o, u\n• Ditongos: aŭ /aw/ (como em 'mau'), eŭ /ew/\n• O 'c' sempre = /ts/ (como em 'pizza')\n• Sem encontros consonantais difíceis\n• Sem fonemas que não existam nas línguas europeias principais",

// ── SCREEN HOOK ───────────────────────────────────────────────────────────────
function useScreen() {
  const get = () => ({ w:window.innerWidth, mobile:window.innerWidth<640, tablet:window.innerWidth>=640&&window.innerWidth<1024 });
  const [s,ss] = useState(get);
  useEffect(() => {
    const h = () => ss(get());
    window.addEventListener("resize",h);
    window.addEventListener("orientationchange",()=>setTimeout(h,250));
    return () => { window.removeEventListener("resize",h); };
  },[]);
  return s;
}

    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream, {mimeType: MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/ogg"});
      chRef.current = [];
      mr.ondataavailable = e => { if(e.data.size>0) chRef.current.push(e.data); };
      mr.onstop = async () => {
        const blob = new Blob(chRef.current,{type:mr.mimeType});
        const d = await b64(blob);
        setAud(d); onSave(d);
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(tmRef.current); setSecs(0);
      };
      mrRef.current = mr; mr.start(100); setRec(true); setSecs(0);
      tmRef.current = setInterval(()=>setSecs(x=>x+1),1000);
    } catch(e) { alert("Permissão de microfone necessária."); }
  };
  const stopRec = () => { mrRef.current?.stop(); setRec(false); };
  const playAud = () => {
    if(!aud) return;
    const a = new Audio(aud); aRef.current=a; a.play(); setPlaying(true);
    a.onended = () => setPlaying(false);
  };
  const stopPlay = () => { aRef.current?.pause(); setPlaying(false); };

  const bs = {display:"inline-flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,border:"none",transition:"all 0.15s"};
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      {rec
        ? <button style={{...bs,background:"rgba(255,80,80,0.2)",color:"#ff5555",border:"1px solid rgba(255,80,80,0.4)"}} onClick={stopRec}><Ic n="stop"/>Parar ({secs}s)</button>
        : <button style={{...bs,background:"rgba(255,255,255,0.06)",color:accent,border:`1px solid ${accent}50`}} onClick={startRec}><Ic n="mic"/>{aud?"Re-gravar":label}</button>
      }
      {aud && !rec && (
        playing
          ? <button style={{...bs,background:"rgba(255,255,255,0.06)",color:accent,border:`1px solid ${accent}40`}} onClick={stopPlay}><Ic n="stop"/>Parar</button>
          : <button style={{...bs,background:"rgba(255,255,255,0.06)",color:accent,border:`1px solid ${accent}40`}} onClick={playAud}><Ic n="play"/>Ouvir</button>
      )}
      {aud && !rec && (
        <button style={{...bs,color:"#ff6060",background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.25)"}} onClick={()=>{setAud(null);onSave(null);}}><Ic n="trash"/>Remover</button>
      )}
      {aud && <span style={{fontSize:10,color:accent,opacity:0.7}}>✓ salvo</span>}
    </div>
  );
}

// ── GAME: FIND TRANSLATION / FIND WORD ────────────────────────────────────────
function FindGame({entries, onBack, onXP, t, L, reverse}) {
  const pool = useMemo(()=>[...entries].sort(()=>Math.random()-0.5).slice(0,Math.min(entries.length,10)),[]);
  const [idx, setIdx] = useState(0);
  const [sel, setSel] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const card = pool[idx];
  const choices = useMemo(() => {
    if(!card) return [];
    const wrong = [...entries].filter(e=>e.id!==card.id).sort(()=>Math.random()-0.5).slice(0,3);
    return [...wrong,card].sort(()=>Math.random()-0.5);
  },[idx,card]);

  const handle = c => {
    if(sel) return;
    setSel(c.id);
    if(c.id===card.id){ setScore(s=>s+10); onXP(10); }
    setTimeout(()=>{ if(idx<pool.length-1){ setIdx(i=>i+1); setSel(null); } else setDone(true); },900);
  };

  if(done || !card) {
    return (
      <div style={{textAlign:"center",padding:60}}>
        <div style={{fontSize:60,marginBottom:16}}>🏆</div>
        <h2 style={{fontFamily:t.fD,color:t.accent,marginBottom:8}}>Parabéns!</h2>
        <p style={{color:t.muted,marginBottom:20}}>+{score} pontos!</p>
        <button style={{padding:"10px 24px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:10,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={onBack}>{L.btn.back}</button>
      </div>
    );
  }
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:12}} onClick={onBack}><Ic n="x"/>{L.btn.back}</button>
        <span style={{fontFamily:t.fD,color:t.accent,fontSize:15}}>{reverse?L.game.findW:L.game.findT}</span>
        <span style={{marginLeft:"auto",color:t.muted,fontSize:12}}>{idx+1}/{pool.length} · +{score}pts</span>
      </div>
      <div style={{textAlign:"center",marginBottom:24,padding:"28px 20px",background:t.card,border:`1px solid ${t.cb}`,borderRadius:18}}>
        <div style={{fontSize:11,color:t.muted,marginBottom:8}}>{reverse?"Tradução":"Palavra"}</div>
        <div style={{fontFamily:reverse?t.fB:t.fD,fontSize:reverse?20:32,color:t.accent,textShadow:`0 0 20px ${t.ag}`}}>{reverse?card.translation:card.word}</div>
        {!reverse&&card.pronunciation&&<div style={{fontSize:13,color:t.muted,fontStyle:"italic",marginTop:4}}>{card.pronunciation}</div>}
        {reverse&&card.audio&&<button style={{margin:"10px auto 0",display:"flex",alignItems:"center",gap:5,padding:"5px 12px",background:t.surf,color:t.accent,border:`1px solid ${t.cb}`,borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:t.fB}} onClick={()=>new Audio(card.audio).play()}><Ic n="play"/>Ouvir</button>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {choices.map(c => {
          const ok=c.id===card.id; const isSel=sel===c.id;
          const bg=sel?(ok?"rgba(34,197,94,0.15)":isSel?"rgba(239,68,68,0.15)":t.card):t.card;
          const border=sel?(ok?"#22c55e":isSel?"#ef4444":t.cb):t.cb;
          const color=sel?(ok?"#22c55e":isSel?"#ef4444":t.muted):t.text;
          return (
            <div key={c.id} onClick={()=>handle(c)} style={{background:bg,border:`1px solid ${border}`,borderRadius:14,padding:"14px 12px",cursor:sel?"default":"pointer",textAlign:"center",fontSize:reverse?17:14,fontFamily:reverse?t.fD:t.fB,color,minHeight:62,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",animation:isSel&&!ok?"shake 0.3s":""}}>
              {reverse?c.word:c.translation}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── GAME: MIXED LETTERS ───────────────────────────────────────────────────────
function MixedGame({entries, onBack, onXP, t, L}) {
  const pool = useMemo(()=>[...entries].filter(e=>e.word.length>=3).sort(()=>Math.random()-0.5).slice(0,8),[]);
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [built, setBuilt] = useState([]);
  const [avail, setAvail] = useState([]);
  const [result, setResult] = useState(null);
  const card = pool[idx];

  useEffect(() => {
    if(card) {
      const sh = [...card.word.toUpperCase()].sort(()=>Math.random()-0.5).map((ch,i)=>({ch,id:i}));
      setAvail(sh); setBuilt([]); setResult(null);
    }
  },[idx]);

  const pick = item => { setBuilt(b=>[...b,item]); setAvail(a=>a.filter(x=>x.id!==item.id)); };
  const unpick = item => { setAvail(a=>[...a,item]); setBuilt(b=>b.filter(x=>x.id!==item.id)); };
  const checkAns = () => {
    const ans = built.map(x=>x.ch).join("");
    if(ans===card.word.toUpperCase()){
      setResult("ok"); setScore(s=>s+15); onXP(15);
      setTimeout(()=>{ if(idx<pool.length-1){ setIdx(i=>i+1); } else setDone(true); },800);
    } else {
      setResult("err");
      setTimeout(()=>{ const all=[...built,...avail].sort(()=>Math.random()-0.5).map((x,i)=>({...x,id:i})); setAvail(all); setBuilt([]); setResult(null); },800);
    }
  };
  const chip = (item,onClick) => (
    <div key={item.id} onClick={()=>onClick(item)} style={{width:38,height:42,background:t.surf,border:`1px solid ${t.cb}`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontFamily:t.fD,fontSize:18,color:t.accent,transition:"all 0.15s",userSelect:"none"}}>
      {item.ch}
    </div>
  );

  if(done || !card) {
    return (
      <div style={{textAlign:"center",padding:60}}>
        <div style={{fontSize:60,marginBottom:16}}>🎯</div>
        <h2 style={{fontFamily:t.fD,color:t.accent,marginBottom:8}}>Parabéns! +{score} pts</h2>
        <button style={{padding:"10px 24px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:10,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={onBack}>{L.btn.back}</button>
      </div>
    );
  }
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:12}} onClick={onBack}><Ic n="x"/>{L.btn.back}</button>
        <span style={{fontFamily:t.fD,color:t.accent,fontSize:15}}>{L.game.mixed}</span>
        <span style={{marginLeft:"auto",color:t.muted,fontSize:12}}>{idx+1}/{pool.length} · +{score}pts</span>
      </div>
      <div style={{textAlign:"center",padding:"18px",background:t.card,border:`1px solid ${t.cb}`,borderRadius:16,marginBottom:18}}>
        <div style={{fontSize:11,color:t.muted,marginBottom:4}}>Tradução</div>
        <div style={{fontSize:18,color:t.text,marginBottom:3}}>{card.translation}</div>
        <div style={{fontSize:13,color:t.muted,fontStyle:"italic"}}>{card.pronunciation}</div>
      </div>
      <div style={{background:result==="ok"?"rgba(34,197,94,0.1)":result==="err"?"rgba(239,68,68,0.1)":t.surf,border:`1px solid ${result==="ok"?"#22c55e":result==="err"?"#ef4444":t.cb}`,borderRadius:14,padding:"14px",minHeight:54,display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginBottom:14,transition:"all 0.2s"}}>
        {built.length===0 ? <span style={{color:t.muted,fontSize:13,alignSelf:"center"}}>Clique nas letras...</span> : built.map(item=>chip(item,unpick))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginBottom:14}}>{avail.map(item=>chip(item,pick))}</div>
      <div style={{textAlign:"center"}}><button style={{padding:"10px 28px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:10,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={checkAns} disabled={built.length===0}>Verificar</button></div>
    </div>
  );
}

// ── GAME: FLASHCARD ───────────────────────────────────────────────────────────
function FlashGame({entries, onBack, onXP, t, L, onMem}) {
  const pool = useMemo(()=>[...entries].sort(()=>Math.random()-0.5).slice(0,10),[]);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlip] = useState(false);
  const [score, setScore] = useState({ok:0,fail:0});
  const [done, setDone] = useState(false);
  const card = pool[idx];

  const next = ok => {
    if(ok){ setScore(s=>({...s,ok:s.ok+1})); onXP(8); onMem(card.id,true); }
    else { setScore(s=>({...s,fail:s.fail+1})); onMem(card.id,false); }
    if(idx<pool.length-1){ setIdx(i=>i+1); setFlip(false); } else setDone(true);
  };

  if(done || !card) {
    return (
      <div style={{textAlign:"center",padding:60}}>
        <div style={{fontSize:60,marginBottom:16}}>🎓</div>
        <h2 style={{fontFamily:t.fD,color:t.accent,marginBottom:8}}>Sessão Concluída!</h2>
        <p style={{color:t.muted,marginBottom:24}}>✅ {score.ok} · ❌ {score.fail}</p>
        <button style={{padding:"10px 24px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:10,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={onBack}>{L.btn.back}</button>
      </div>
    );
  }
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:12}} onClick={onBack}><Ic n="x"/>{L.btn.back}</button>
        <span style={{fontFamily:t.fD,color:t.accent,fontSize:15}}>{L.game.flash}</span>
        <span style={{marginLeft:"auto",color:t.muted,fontSize:12}}>{idx+1}/{pool.length}</span>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",textAlign:"center"}}>
        <div onClick={()=>setFlip(f=>!f)} style={{background:t.card,border:`1px solid ${flipped?t.accent:t.cb}`,borderRadius:20,padding:"44px 28px",cursor:"pointer",minHeight:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all 0.3s",boxShadow:flipped?`0 0 30px ${t.ag}`:"none"}}>
          {!flipped ? (
            <>
              <div style={{fontFamily:t.fD,fontSize:34,color:t.accent,textShadow:`0 0 20px ${t.ag}`,marginBottom:6}}>{card.word}</div>
              <div style={{fontSize:13,color:t.muted,fontStyle:"italic"}}>{card.pronunciation}</div>
              {card.image && <img src={card.image} alt="" style={{marginTop:12,height:80,borderRadius:10,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
              <div style={{fontSize:11,color:t.muted,marginTop:16}}>Toque para revelar</div>
            </>
          ) : (
            <>
              <div style={{fontSize:12,color:t.muted,marginBottom:4,fontStyle:"italic"}}>{card.word}</div>
              <div style={{fontFamily:t.fD,fontSize:22,color:t.accent,marginBottom:10}}>{card.translation}</div>
              <div style={{fontSize:13,color:t.text,lineHeight:1.6,maxWidth:340}}>{card.definition}</div>
              {card.audio && (
                <button style={{marginTop:12,display:"flex",alignItems:"center",gap:5,padding:"5px 12px",background:t.surf,color:t.accent,border:`1px solid ${t.cb}`,borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:t.fB}} onClick={e=>{e.stopPropagation();new Audio(card.audio).play();}}>
                  <Ic n="play"/>Ouvir
                </button>
              )}
            </>
          )}
        </div>
        {flipped && (
          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:18}}>
            <button style={{padding:"10px 28px",background:"rgba(34,197,94,0.2)",color:"#22c55e",border:"1px solid rgba(34,197,94,0.4)",borderRadius:12,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={()=>next(true)}>✅ Sabia</button>
            <button style={{padding:"10px 28px",background:"rgba(239,68,68,0.15)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.35)",borderRadius:12,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={()=>next(false)}>❌ Revisar</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── GAME: MATCH ───────────────────────────────────────────────────────────────
function MatchGame({entries, onBack, onXP, t, L}) {
  const pool = useMemo(()=>[...entries].sort(()=>Math.random()-0.5).slice(0,6),[]);
  const [sel, setSel] = useState(null);
  const [matched, setMatched] = useState(new Set());
  const [wrong, setWrong] = useState(new Set());
  const [score, setScore] = useState(0);
  const cards = useMemo(()=>[...pool.map(e=>({id:e.id,text:e.word,type:"w"})),...[...pool].sort(()=>Math.random()-0.5).map(e=>({id:e.id,text:e.translation,type:"t"}))],[]);
  const done = matched.size===pool.length*2;

  const handle = c => {
    const k=c.id+c.type;
    if(matched.has(k)||wrong.has(k)) return;
    if(!sel){ setSel(c); return; }
    if(sel.id===c.id&&sel.type!==c.type){ setMatched(m=>new Set([...m,c.id+"w",c.id+"t"])); setScore(s=>s+10); onXP(10); }
    else { const w=new Set([sel.id+sel.type,k]); setWrong(w); setTimeout(()=>setWrong(new Set()),700); }
    setSel(null);
  };

  if(done) {
    return (
      <div style={{textAlign:"center",padding:60}}>
        <div style={{fontSize:60,marginBottom:16}}>🏆</div>
        <h2 style={{fontFamily:t.fD,color:t.accent,marginBottom:8}}>Perfeito! +{score} pts</h2>
        <button style={{padding:"10px 24px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:10,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={onBack}>{L.btn.back}</button>
      </div>
    );
  }
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:12}} onClick={onBack}><Ic n="x"/>{L.btn.back}</button>
        <span style={{fontFamily:t.fD,color:t.accent,fontSize:15}}>{L.game.match}</span>
        <span style={{marginLeft:"auto",color:t.accent,fontFamily:t.fD}}>+{score}pts</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,maxWidth:560,margin:"0 auto"}}>
        {cards.map(c => {
          const k=c.id+c.type; const isSel=sel?.id===c.id&&sel?.type===c.type;
          const isM=matched.has(k); const isW=wrong.has(k);
          return (
            <div key={k} onClick={()=>handle(c)} style={{background:isM?"rgba(34,197,94,0.15)":isW?"rgba(239,68,68,0.15)":isSel?t.ag:t.card,border:`1px solid ${isM?"#22c55e":isW?"#ef4444":isSel?t.accent:t.cb}`,borderRadius:12,padding:"14px 10px",cursor:"pointer",textAlign:"center",fontFamily:c.type==="w"?t.fD:t.fB,fontSize:c.type==="w"?18:13,color:isM?"#22c55e":isW?"#ef4444":c.type==="w"?t.accent:t.text,minHeight:62,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.18s",animation:isW?"shake 0.3s":""}}>
              {isM ? <Ic n="check" sz={20}/> : c.text}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── GAME: CROSSWORD ───────────────────────────────────────────────────────────
function CrossGame({entries, onBack, onXP, t, L}) {
  const words = entries.slice(0,4).map(e=>({word:e.word.toUpperCase(),def:e.translation}));
  const SZ=12; const grid=Array(SZ).fill(null).map(()=>Array(SZ).fill(null)); const placed=[];
  const pw = (word,r,c,h) => { for(let i=0;i<word.length;i++) h?grid[r][c+i]=word[i]:grid[r+i][c]=word[i]; placed.push({word,def:words.find(w=>w.word===word)?.def||"",r,c,h,num:placed.length+1}); };
  if(words[0]?.word.length<=9) pw(words[0].word,2,1,true);
  if(words[1]?.word.length<=8) pw(words[1].word,1,4,false);
  if(words[2]?.word.length<=9) pw(words[2].word,5,2,true);
  if(words[3]?.word.length<=7) pw(words[3].word,3,8,false);
  const [inputs, setInputs] = useState({});
  const [checked, setChecked] = useState(false);
  const [won, setWon] = useState(false);
  const setInp = (r,c,v) => setInputs(p=>({...p,[`${r},${c}`]:v.toUpperCase().slice(0,1)}));
  const doCheck = () => {
    let all=true;
    for(let r=0;r<SZ;r++) for(let c=0;c<SZ;c++) if(grid[r][c]&&grid[r][c]!==(inputs[`${r},${c}`]||"")) all=false;
    setChecked(true); if(all){ setWon(true); onXP(40); }
  };

  if(won) {
    return (
      <div style={{textAlign:"center",padding:60}}>
        <div style={{fontSize:60,marginBottom:16}}>🎉</div>
        <h2 style={{fontFamily:t.fD,color:t.accent,marginBottom:8}}>Completo! +40 XP</h2>
        <button style={{padding:"10px 24px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:10,cursor:"pointer",fontFamily:t.fB,fontSize:14}} onClick={onBack}>{L.btn.back}</button>
      </div>
    );
  }
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:12}} onClick={onBack}><Ic n="x"/>{L.btn.back}</button>
        <span style={{fontFamily:t.fD,color:t.accent,fontSize:15}}>{L.game.cross}</span>
      </div>
      <div style={{display:"flex",gap:24,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div style={{overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${SZ},30px)`,gap:2}}>
            {Array(SZ).fill(null).map((_,r)=>Array(SZ).fill(null).map((__,c)=>{
              const ch=grid[r][c]; const k=`${r},${c}`; const inp=inputs[k]||"";
              const ok=checked&&ch&&inp===ch; const err=checked&&ch&&inp&&inp!==ch;
              if(!ch) return <div key={k} style={{width:30,height:30,background:t.light?"#ccd0dd":"#050510",borderRadius:3}}/>;
              return (
                <div key={k} style={{width:30,height:30}}>
                  <input maxLength={1} value={inp} onChange={e=>setInp(r,c,e.target.value)} style={{width:"100%",height:"100%",textAlign:"center",background:ok?"rgba(34,197,94,0.2)":err?"rgba(239,68,68,0.2)":t.surf,border:`1px solid ${ok?"#22c55e":err?"#ef4444":t.cb}`,color:t.accent,borderRadius:3,fontFamily:t.fD,fontSize:14,outline:"none",cursor:"text"}}/>
                </div>
              );
            }))}
          </div>
          <button style={{marginTop:12,padding:"8px 22px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:13}} onClick={doCheck}>Verificar</button>
          {checked&&!won&&<p style={{color:"#ef4444",marginTop:8,fontSize:12}}>Continue tentando!</p>}
        </div>
        <div style={{flex:1,minWidth:160}}>
          <div style={{fontFamily:t.fD,color:t.accent,fontSize:11,letterSpacing:1,marginBottom:8}}>HORIZONTAIS</div>
          {placed.filter(p=>p.h).map(p=><div key={p.num} style={{marginBottom:7,fontSize:13}}><span style={{color:t.accent,fontFamily:t.fD,marginRight:5}}>{p.num}.</span><span style={{color:t.muted}}>{p.def}</span></div>)}
          <div style={{fontFamily:t.fD,color:t.accent,fontSize:11,letterSpacing:1,marginBottom:8,marginTop:14}}>VERTICAIS</div>
          {placed.filter(p=>!p.h).map(p=><div key={p.num} style={{marginBottom:7,fontSize:13}}><span style={{color:t.accent,fontFamily:t.fD,marginRight:5}}>{p.num}.</span><span style={{color:t.muted}}>{p.def}</span></div>)}
        </div>
      </div>
    </div>
  );
}

// ── PHONOLOGY SECTION ─────────────────────────────────────────────────────────
function PhonSection({dict, onChange, t}) {
  const ph = dict.phonology||{usedConsonants:[],usedVowels:[],toneSystem:"",notes:""};
  const tog = (k,p) => { const a=ph[k]||[]; onChange({...ph,[k]:a.includes(p)?a.filter(x=>x!==p):[...a,p]}); };
  const cell = (p,used,k) => p ? (
    <div key={p} onClick={()=>tog(k,p)} style={{padding:"5px 3px",textAlign:"center",background:used?t.ag:t.surf,border:`1px solid ${used?t.accent:t.cb}`,borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"monospace",color:used?t.accent:t.muted,transition:"all 0.15s",boxShadow:used?`0 0 8px ${t.ag}`:"",userSelect:"none"}}>
      {p}
    </div>
  ) : <div/>;
  const ta = {background:t.inp,border:`1px solid ${t.cb}`,color:t.text,padding:"8px 12px",borderRadius:9,fontFamily:t.fB,fontSize:13,outline:"none",width:"100%"};
  return (
    <div>
      <h2 style={{fontFamily:t.fD,fontSize:20,color:t.accent,marginBottom:4}}>Fonologia</h2>
      <p style={{color:t.muted,fontSize:13,marginBottom:20}}>Clique nos fonemas para marcar os usados na conlang.</p>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:t.fD,color:t.accent,fontSize:11,letterSpacing:1,marginBottom:8}}>CONSOANTES — {(ph.usedConsonants||[]).length} selecionadas</div>
        <div style={{overflowX:"auto"}}>
          {IPA_C.map(row=>(
            <div key={row.l} style={{display:"grid",gridTemplateColumns:"80px repeat(9,1fr)",gap:3,marginBottom:3,alignItems:"center"}}>
              <div style={{fontSize:10,color:t.muted,textAlign:"right",paddingRight:6}}>{row.l}</div>
              {row.r.map((p,i)=>cell(p,(ph.usedConsonants||[]).includes(p),"usedConsonants"))}
            </div>
          ))}
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:t.fD,color:t.accent,fontSize:11,letterSpacing:1,marginBottom:8}}>VOGAIS — {(ph.usedVowels||[]).length} selecionadas</div>
        <div style={{overflowX:"auto"}}>
          {IPA_V.map(row=>(
            <div key={row.l} style={{display:"grid",gridTemplateColumns:"80px repeat(6,1fr)",gap:3,marginBottom:3,alignItems:"center"}}>
              <div style={{fontSize:10,color:t.muted,textAlign:"right",paddingRight:6}}>{row.l}</div>
              {row.r.map((p,i)=>cell(p,(ph.usedVowels||[]).includes(p),"usedVowels"))}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><label style={{fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4}}>Sistema de Tons</label><input style={ta} value={ph.toneSystem||""} onChange={e=>onChange({...ph,toneSystem:e.target.value})}/></div>
        <div><label style={{fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4}}>Fonotática</label><input style={ta} value={ph.phonotactics||""} onChange={e=>onChange({...ph,phonotactics:e.target.value})}/></div>
      </div>
      <div><label style={{fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4}}>Notas</label><textarea style={{...ta,resize:"vertical",minHeight:80}} value={ph.notes||""} onChange={e=>onChange({...ph,notes:e.target.value})}/></div>
    </div>
  );
}

// ── GRAMMAR SECTION ───────────────────────────────────────────────────────────
function GramSection({dict, onChange, t}) {
  const g = dict.grammar||{morphology:"",syntax:"",writingSystem:"",custom:[]};
  const [ns, setNs] = useState("");
  const ta = {background:t.inp,border:`1px solid ${t.cb}`,color:t.text,padding:"10px 12px",borderRadius:9,fontFamily:t.fB,fontSize:13,outline:"none",width:"100%",resize:"vertical",minHeight:100};
  const lbl = {fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4,marginTop:14};
  const addSec = () => { if(ns.trim()){ onChange({...g,custom:[...(g.custom||[]),{title:ns.trim(),content:""}]}); setNs(""); } };
  return (
    <div>
      <h2 style={{fontFamily:t.fD,fontSize:20,color:t.accent,marginBottom:4}}>Gramática</h2>
      <p style={{color:t.muted,fontSize:13,marginBottom:12}}>Documente as regras gramaticais da sua conlang.</p>
      {[["morphology","Morfologia"],["syntax","Sintaxe"],["writingSystem","Sistema de Escrita"]].map(([k,lb])=>(
        <div key={k}><label style={lbl}>{lb}</label><textarea style={ta} value={g[k]||""} onChange={e=>onChange({...g,[k]:e.target.value})}/></div>
      ))}
      {(g.custom||[]).map((sec,i)=>(
        <div key={i}>
          <div style={{display:"flex",gap:8,marginTop:14,marginBottom:4}}>
            <input style={{...ta,minHeight:0,flex:1,padding:"5px 10px",fontSize:9,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase"}} value={sec.title} onChange={e=>{const c=[...(g.custom||[])];c[i]={...c[i],title:e.target.value};onChange({...g,custom:c});}}/>
            <button style={{padding:"5px 10px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",borderRadius:7,cursor:"pointer"}} onClick={()=>onChange({...g,custom:(g.custom||[]).filter((_,j)=>j!==i)})}>✕</button>
          </div>
          <textarea style={ta} value={sec.content} onChange={e=>{const c=[...(g.custom||[])];c[i]={...c[i],content:e.target.value};onChange({...g,custom:c});}}/>
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <input style={{...ta,minHeight:0,flex:1,padding:"8px 12px"}} value={ns} onChange={e=>setNs(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSec()} placeholder="Nome da nova seção..."/>
        <button style={{padding:"8px 16px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:9,cursor:"pointer",fontFamily:t.fB,whiteSpace:"nowrap",fontSize:13}} onClick={addSec}><Ic n="plus"/> Seção</button>
      </div>
    </div>
  );
}

// ── LESSON SECTION (CORRIGIDO) ────────────────────────────────────────────────
function LessonSection({dict, onUpdate, study, onStudyUpdate, notify, t, L}) {
  const [view, setView] = useState("list");
  const [lf, setLf] = useState({title:"",description:"",entryIds:[],content:""});
  const [studying, setStudying] = useState(null);
  const lessons = dict?.lessons||[];
  const progress = study?.lessonProgress||{};

  const saveLesson = () => {
    if(!lf.title){ notify("Título obrigatório!","err"); return; }
    const lesson = {...lf, id: lf.id||Date.now(), created: lf.created||new Date().toISOString().split("T")[0]};
    const newLessons = lf.id ? lessons.map(l=>l.id===lf.id?lesson:l) : [...lessons,lesson];
    onUpdate({...dict,lessons:newLessons});
    onStudyUpdate(s=>({...s,xp:(s.xp||0)+15}));
    setView("list"); notify("Lição salva! +15 XP");
  };

  const markDone = id => {
    onStudyUpdate(s=>({...s,xp:(s.xp||0)+30,lessonProgress:{...s.lessonProgress,[id]:{completed:true,completedAt:new Date().toISOString()}}}));
    notify("Lição concluída! +30 XP 🎉");
  };

  // STUDY VIEW
  if(studying !== null) {
    const lesson = lessons.find(l=>l.id===studying);
    if(!lesson) { setStudying(null); return null; }
    const words = (dict?.entries||[]).filter(e=>(lesson.entryIds||[]).includes(e.id));
    const isDone = !!progress[studying]?.completed;
    return (
      <div style={{maxWidth:720}}>
        <button style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:13,marginBottom:20}} onClick={()=>setStudying(null)}><Ic n="x"/>{L.btn.back}</button>
        <div style={{fontFamily:t.fD,color:t.accent,fontSize:10,letterSpacing:2,marginBottom:6}}>LIÇÃO</div>
        <h2 style={{fontFamily:t.fD,fontSize:24,color:t.text,marginBottom:6}}>{lesson.title}</h2>
        <p style={{color:t.muted,fontSize:14,marginBottom:18}}>{lesson.description}</p>
        {lesson.content && <div style={{background:t.surf,border:`1px solid ${t.cb}`,borderRadius:14,padding:18,marginBottom:18,fontSize:14,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{lesson.content}</div>}
        <div style={{fontFamily:t.fD,color:t.accent,fontSize:10,letterSpacing:1,marginBottom:10}}>VOCABULÁRIO ({words.length} palavras)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10,marginBottom:20}}>
          {words.map(e => (
            <div key={e.id} style={{background:t.card,border:`1px solid ${t.cb}`,borderRadius:12,padding:14}}>
              {e.image && <img src={e.image} alt="" style={{width:"100%",height:70,objectFit:"cover",borderRadius:8,marginBottom:8}} onError={er=>er.target.style.display="none"}/>}
              <div style={{fontFamily:t.fD,fontSize:17,color:t.accent}}>{e.word}</div>
              <div style={{fontSize:12,color:t.muted,fontStyle:"italic",marginBottom:4}}>{e.pronunciation}</div>
              <div style={{fontSize:13,color:t.text,marginBottom:8}}>{e.translation}</div>
              {e.audio && <button style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:t.surf,color:t.accent,border:`1px solid ${t.cb}`,borderRadius:7,cursor:"pointer",fontFamily:t.fB,fontSize:11}} onClick={()=>new Audio(e.audio).play()}><Ic n="play" sz={12}/>{L.btn.listen}</button>}
            </div>
          ))}
        </div>
        {!isDone
          ? <button style={{padding:"11px 28px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:12,cursor:"pointer",fontFamily:t.fB,fontSize:14,fontWeight:600}} onClick={()=>markDone(studying)}>✅ Marcar como concluída (+30 XP)</button>
          : <div style={{color:"#22c55e",fontFamily:t.fD,fontSize:13}}>✓ Concluída em {new Date(progress[studying].completedAt).toLocaleDateString("pt-BR")}</div>
        }
      </div>
    );
  }

  // EDIT VIEW
  if(view==="edit") {
    return (
      <div style={{maxWidth:580}}>
        <button style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",background:t.surf,color:t.muted,border:`1px solid ${t.cb}`,borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:13,marginBottom:18}} onClick={()=>setView("list")}><Ic n="x"/>{L.btn.cancel}</button>
        <h2 style={{fontFamily:t.fD,color:t.accent,marginBottom:18}}>{lf.id?"Editar Lição":"Nova Lição"}</h2>
        {[["title","Título *"],["description","Descrição"]].map(([k,lb])=>(
          <div key={k} style={{marginBottom:12}}>
            <label style={{fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4}}>{lb}</label>
            <input style={{background:t.inp,border:`1px solid ${t.cb}`,color:t.text,padding:"8px 12px",borderRadius:9,fontFamily:t.fB,fontSize:14,outline:"none",width:"100%"}} value={lf[k]||""} onChange={e=>setLf(p=>({...p,[k]:e.target.value}))}/>
          </div>
        ))}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4}}>Conteúdo</label>
          <textarea style={{background:t.inp,border:`1px solid ${t.cb}`,color:t.text,padding:"10px 12px",borderRadius:9,fontFamily:t.fB,fontSize:13,outline:"none",width:"100%",resize:"vertical",minHeight:100}} value={lf.content||""} onChange={e=>setLf(p=>({...p,content:e.target.value}))}/>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{fontSize:9,color:t.muted,fontFamily:t.fD,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:8}}>Palavras ({(lf.entryIds||[]).length} selecionadas)</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:5,maxHeight:200,overflowY:"auto"}}>
            {(dict?.entries||[]).map(e => {
              const isSel = (lf.entryIds||[]).includes(e.id);
              return (
                <div key={e.id} onClick={()=>setLf(p=>({...p,entryIds:isSel?(p.entryIds||[]).filter(x=>x!==e.id):[...(p.entryIds||[]),e.id]}))} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",background:isSel?t.ag:t.surf,border:`1px solid ${isSel?t.accent:t.cb}`,borderRadius:8,cursor:"pointer"}}>
                  {isSel && <Ic n="check" sz={12}/>}
                  <span style={{fontFamily:t.fD,color:isSel?t.accent:t.muted,fontSize:12,flexShrink:0}}>{e.word}</span>
                  <span style={{color:t.muted,fontSize:11,marginLeft:"auto",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.translation}</span>
                </div>
              );
            })}
          </div>
        </div>
        <button style={{padding:"9px 22px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:14,fontWeight:600}} onClick={saveLesson}>{L.btn.save}</button>
      </div>
    );
  }

  // LIST VIEW
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontFamily:t.fD,fontSize:20,color:t.accent}}>{L.nav.lessons}</h2><p style={{color:t.muted,fontSize:12}}>{dict.name} — {lessons.length} lições</p></div>
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",background:t.accent,color:t.light?"#fff":"#000",border:"none",borderRadius:9,cursor:"pointer",fontFamily:t.fB,fontSize:13,fontWeight:600}} onClick={()=>{setLf({title:"",description:"",entryIds:[],content:""});setView("edit");}}>
          <Ic n="plus"/>Nova Lição
        </button>
      </div>
      {lessons.length===0 ? (
        <div style={{textAlign:"center",padding:60,color:t.muted}}>
